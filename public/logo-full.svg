<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 48" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="full-slash-gradient" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="full-slash-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Linear -->
  <text x="0" y="38" font-family="Syne, sans-serif" font-weight="800" font-size="32" fill="#F0F0F5">Linear</text>
  <!-- Slash with gradient + glow -->
  <text x="118" y="38" font-family="Syne, sans-serif" font-weight="800" font-size="32" fill="url(#full-slash-gradient)" filter="url(#full-slash-glow)">/</text>
  <!-- MS smaller, secondary -->
  <text x="138" y="38" font-family="Syne, sans-serif" font-weight="500" font-size="20" fill="#8B8B9E">MS</text>
</svg>
